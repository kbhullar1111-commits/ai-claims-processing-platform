      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=documentdb;Username=postgres;Password=postgres
      ConnectionStrings__ServiceBus: ${SERVICEBUS_CONNECTION_STRING}
      ConnectionStrings__BlobStorage: ${BLOB_STORAGE_CONNECTION_STRING}
      Storage__ContainerName: claim-documents
      ApplicationInsights__ConnectionString: ${APPINSIGHTS_CONNECTION_STRING}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - claims-network
    ports:
      - "5003:8080"

  fraud-api:
