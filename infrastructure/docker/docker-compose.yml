services:

  postgres:
    image: postgres:15
    container_name: claims-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management
    container_name: claims-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: claimsuser
      RABBITMQ_DEFAULT_PASS: claimspassword
    ports:
      - "5672:5672"
      - "15672:15672"

  # Uncomment this service if Seq is needed again for log investigation.
  # seq:
  #   image: datalust/seq:latest
  #   container_name: seq
  #   ports:
  #     - "5341:80"
  #   environment:
  #     - ACCEPT_EULA=Y
  #     - SEQ_FIRSTRUN_NOAUTHENTICATION=true

  # Run this one-shot container only when schema changes need to be applied.
  # Usage: docker compose --profile migrate up claims-migrator
  claims-migrator:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: claims-migrator
    profiles:
      - migrate
    working_dir: /src
    volumes:
      - ../..:/src
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=claimsdb;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: claimsuser
      RabbitMq__Password: claimspassword
    command: >-
      /bin/sh -c "dotnet tool install --global dotnet-ef --version 10.*
      && export PATH=$$PATH:/root/.dotnet/tools
      && dotnet restore services/claims-service/ClaimsService.API/ClaimsService.API.csproj --force
      && dotnet restore services/claims-service/ClaimsService.Infrastructure/ClaimsService.Infrastructure.csproj --force
      && dotnet ef database update
      --project services/claims-service/ClaimsService.Infrastructure/ClaimsService.Infrastructure.csproj
      --startup-project services/claims-service/ClaimsService.API/ClaimsService.API.csproj"
    depends_on:
      postgres:
        condition: service_healthy

  # Run this one-shot container only when schema changes need to be applied.
  # Usage: docker compose --profile migrate up notification-migrator
  notification-migrator:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: notification-migrator
    profiles:
      - migrate
    working_dir: /src
    volumes:
      - ../..:/src
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=notificationdb;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: claimsuser
      RabbitMq__Password: claimspassword
    command: >-
      /bin/sh -c "dotnet tool install --global dotnet-ef --version 10.*
      && export PATH=$$PATH:/root/.dotnet/tools
      && dotnet restore services/notification-service/NotificationService.API/NotificationService.API.csproj --force
      && dotnet restore services/notification-service/NotificationService.Infrastructure/NotificationService.Infrastructure.csproj --force
      && dotnet ef database update
      --project services/notification-service/NotificationService.Infrastructure/NotificationService.Infrastructure.csproj
      --startup-project services/notification-service/NotificationService.API/NotificationService.API.csproj"
    depends_on:
      postgres:
        condition: service_healthy

  claims-api:
    container_name: claims-api
    build:
      context: ../..
      dockerfile: services/claims-service/ClaimsService.API/Dockerfile
    # APIs assume the database has already been migrated when started normally.
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=claimsdb;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: claimsuser
      RabbitMq__Password: claimspassword
    depends_on:
      rabbitmq:
        condition: service_started
    ports:
      - "5001:8080"

  notification-api:
    container_name: notification-api
    build:
      context: ../..
      dockerfile: services/notification-service/NotificationService.API/Dockerfile
    # APIs assume the database has already been migrated when started normally.
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=notificationdb;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: claimsuser
      RabbitMq__Password: claimspassword
    depends_on:
      rabbitmq:
        condition: service_started
    ports:
      - "5002:8080"

volumes:
  postgres-data: