services:

  postgres:
    image: postgres:15
    container_name: claims-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management
    container_name: claims-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: claimsuser
      RABBITMQ_DEFAULT_PASS: claimspassword
    ports:
      - "5672:5672"
      - "15672:15672"
  # Optional observability services such as Seq live in docker-compose.observability.yml.

  claims-api:
    container_name: claims-api
    build:
      context: ../..
      dockerfile: services/claims-service/ClaimsService.API/Dockerfile
    # Base compose contains steady-state runtime services only.
    # Run migrations separately before first startup or after schema changes.
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=claimsdb;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: claimsuser
      RabbitMq__Password: claimspassword
    depends_on:
      rabbitmq:
        condition: service_started
    ports:
      - "5001:8080"

  notification-api:
    container_name: notification-api
    build:
      context: ../..
      dockerfile: services/notification-service/NotificationService.API/Dockerfile
    # Base compose contains steady-state runtime services only.
    # Run migrations separately before first startup or after schema changes.
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=notificationdb;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: claimsuser
      RabbitMq__Password: claimspassword
    depends_on:
      rabbitmq:
        condition: service_started
    ports:
      - "5002:8080"

volumes:
  postgres-data: