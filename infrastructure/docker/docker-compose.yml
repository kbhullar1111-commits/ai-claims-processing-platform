      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - claims-network
    ports:
      - "5002:8080"
  
  document-api:
    container_name: document-api
    build:
      context: ../..
      dockerfile: services/document-service/DocumentService.API/Dockerfile
    # Base compose contains steady-state runtime services only.
    # Run migrations separately before first startup or after schema changes.
    environment:
      ASPNETCORE_ENVIRONMENT: Development
