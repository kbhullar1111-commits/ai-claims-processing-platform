  # Optional observability services such as Seq live in docker-compose.observability.yml.

  claims-api:
    container_name: claims-api
    build:
      context: ../..
      dockerfile: services/claims-service/ClaimsService.API/Dockerfile
    # Base compose contains steady-state runtime services only.
    # Run migrations separately before first startup or after schema changes.
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=claimsdb;Username=postgres;Password=postgres
      ConnectionStrings__ServiceBus: ${SERVICEBUS_CONNECTION_STRING}
      ApplicationInsights__ConnectionString: ${APPINSIGHTS_CONNECTION_STRING}
      # RabbitMq__Host: rabbitmq
      # RabbitMq__Username: claimsuser
      # RabbitMq__Password: claimspassword
    depends_on:
      postgres:
        condition: service_healthy
      # rabbitmq:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - claims-network
    ports:
      - "5001:8080"

  notification-api:
    container_name: notification-api
    build:
