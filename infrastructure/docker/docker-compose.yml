      ApplicationInsights__ConnectionString: ${APPINSIGHTS_CONNECTION_STRING}
      # RabbitMq__Host: rabbitmq
      # RabbitMq__Username: claimsuser
      # RabbitMq__Password: claimspassword
    # depends_on:
      # rabbitmq:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - claims-network
    ports:
      - "5005:8080"

  payment-api:
    container_name: payment-api
    build:
      context: ../..
      dockerfile: services/payment-service/PaymentService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ServiceBus: ${SERVICEBUS_CONNECTION_STRING}
      ApplicationInsights__ConnectionString: ${APPINSIGHTS_CONNECTION_STRING}
      # RabbitMq__Host: rabbitmq
      # RabbitMq__Username: claimsuser
      # RabbitMq__Password: claimspassword
    # depends_on:
      # rabbitmq:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ready || exit 1"]
